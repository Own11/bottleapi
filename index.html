<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LumenLabs | Bottle-1</title>

<style>
:root{
  --bg:#050505;
  --panel:#0b0b0f;
  --border:#1a1a22;
  --text:#ffffff;
  --muted:#9aa0a6;
  --green:#00ff41;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:Inter,Arial,sans-serif;}

body{
  background:var(--bg);
  color:var(--text);
  height:100vh;
  display:flex;
}

/* SIDEBAR */
.sidebar{
  width:260px;
  background:var(--panel);
  border-right:1px solid var(--border);
  padding:20px;
  display:flex;
  flex-direction:column;
}

.logo{
  font-size:18px;
  font-weight:900;
}

.logo span{color:var(--green)}

.nav{
  margin-top:30px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.nav div{
  padding:10px;
  color:var(--muted);
  cursor:pointer;
  border-radius:8px;
}

.nav div:hover{
  background:#111;
  color:#fff;
}

.btn{
  margin-top:auto;
  padding:12px;
  background:var(--green);
  color:#000;
  font-weight:700;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

/* MAIN */
.main{
  flex:1;
  padding:20px;
  overflow:auto;
}

h1{
  font-size:28px;
  margin-bottom:20px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
}

.card{
  background:var(--panel);
  border:1px solid var(--border);
  padding:15px;
  border-radius:12px;
}

.card p{
  color:var(--muted);
  font-size:13px;
}

.card h2{
  margin-top:10px;
  color:var(--green);
}

.section{
  margin-top:20px;
  background:var(--panel);
  border:1px solid var(--border);
  padding:15px;
  border-radius:12px;
}

input{
  width:100%;
  padding:10px;
  background:#000;
  border:1px solid var(--border);
  color:#fff;
  border-radius:8px;
}

.key-item{
  display:flex;
  justify-content:space-between;
  padding:8px;
  border-bottom:1px solid #111;
  font-family:monospace;
  font-size:12px;
}

.green{color:var(--green)}

@media(max-width:900px){
  .grid{grid-template-columns:1fr;}
  .sidebar{display:none;}
}
</style>
</head>
<body>

<div class="sidebar">
  <div class="logo">LUMEN <span>LABS</span></div>

  <div class="nav">
    <div>Dashboard</div>
    <div>API Keys</div>
    <div>Logs</div>
    <div>Settings</div>
  </div>

  <button class="btn" onclick="generateKey()">Generate Key</button>
</div>

<div class="main">
  <h1>Developer Dashboard</h1>

  <div class="grid">
    <div class="card">
      <p>Active Keys</p>
      <h2 id="keyCount">0</h2>
    </div>

    <div class="card">
      <p>Requests</p>
      <h2>1284</h2>
    </div>

    <div class="card">
      <p>Latency</p>
      <h2>42ms</h2>
    </div>
  </div>

  <div class="section">
    <p style="color:#9aa0a6;font-size:13px">Manual API Key Input</p>
    <input id="manualKey" placeholder="Enter API key..." />
    <button class="btn" style="margin-top:10px" onclick="addManualKey()">Add Key</button>
  </div>

  <div class="section">
    <p style="color:#9aa0a6;font-size:13px">API Keys</p>
    <div id="list"></div>
  </div>
</div>

<script>
let keys=[];

function generateKey(){
  const chars="ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
  let k="ll_";
  for(let i=0;i<16;i++) k+=chars[Math.floor(Math.random()*chars.length)];

  keys.unshift({value:k,time:new Date().toLocaleTimeString()});
  update();
}

function addManualKey(){
  const input=document.getElementById("manualKey");
  if(!input.value) return;

  keys.unshift({value:input.value,time:new Date().toLocaleTimeString()});
  input.value="";
  update();
}

function update(){
  document.getElementById("keyCount").innerText=keys.length;

  const list=document.getElementById("list");
  list.innerHTML=keys.map(k=>`
    <div class="key-item">
      <span class="green">${k.value}</span>
      <span>${k.time}</span>
    </div>
  `).join("");
}
</script>

</body>
</html>
