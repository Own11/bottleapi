<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Lumen Labs | Bottle-1 Nano AI Ecosystem</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">

<style>
:root{
  --primary:#00ff41;
  --bg:#010101;
  --surface:#0a0a0c;
  --card:#0f0f12;
  --text:#fff;
  --dim:#9aa0a6;
  --border:#1f1f25;
  --glow:0 0 25px rgba(0,255,65,.25);
  --radius:18px;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:Inter,sans-serif;
  background:radial-gradient(circle at 30% 20%,rgba(0,255,65,.06),transparent 50%),var(--bg);
  color:var(--text);
  overflow-x:hidden;
}

.container{max-width:1100px;margin:auto;padding:0 20px}

header{
  position:fixed;
  top:0;
  width:100%;
  z-index:1000;
  background:rgba(1,1,1,.7);
  backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
}

header .container{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:16px 0;
}

.logo{
  font-weight:900;
  font-size:20px;
  color:#fff;
  text-decoration:none;
}

.logo span{color:var(--primary)}

nav a{
  color:var(--dim);
  margin-left:18px;
  text-decoration:none;
  font-size:13px;
}

nav a:hover{color:var(--primary)}

.hero{
  padding:160px 0 60px;
  text-align:center;
}

h1{
  font-size:clamp(42px,7vw,86px);
  letter-spacing:-2px;
}

.hero p{
  color:var(--dim);
  max-width:720px;
  margin:18px auto;
}

.btn{
  padding:14px 22px;
  border-radius:12px;
  font-weight:700;
  border:none;
  cursor:pointer;
  transition:.25s;
}

.btn-primary{
  background:var(--primary);
  color:#000;
}

.btn-outline{
  background:transparent;
  border:1px solid var(--border);
  color:#fff;
}

.btn:hover{
  transform:translateY(-3px);
  box-shadow:var(--glow);
}

.console{
  margin-top:40px;
  display:grid;
  grid-template-columns:1.2fr .8fr;
  gap:24px;
}

@media(max-width:900px){
  .console{grid-template-columns:1fr}
}

.box{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:22px;
  padding:24px;
}

#keyDisplay{
  display:none;
  font-family:"Fira Code",monospace;
  background:#000;
  padding:14px;
  border-radius:10px;
  border:1px dashed var(--primary);
  color:var(--primary);
  margin:12px 0;
  word-break:break-all;
}

#dbLog{
  margin-top:12px;
  font-family:"Fira Code",monospace;
  font-size:12px;
  color:#777;
  max-height:200px;
  overflow:auto;
  border-left:2px solid var(--border);
  padding-left:10px;
}

footer{
  text-align:center;
  padding:50px 0;
  color:#333;
  border-top:1px solid var(--border);
  margin-top:60px;
}
</style>
</head>

<body>

<header>
  <div class="container">
    <a class="logo">LUMEN<span>LABS</span></a>
    <nav>
      <a href="#console">Console</a>
      <a href="#ecosystem">Services</a>
    </nav>
  </div>
</header>

<section class="hero">
  <div class="container">
    <h1>Bottle-1 Nano</h1>
    <p>AI ecosystem for education and developer tools.</p>
    <div>
      <a href="#console" class="btn btn-primary">Generate API Key</a>
      <a href="#console" class="btn btn-outline">Open Console</a>
    </div>

    <div class="console" id="console">

      <div class="box">
        <h3>API Console</h3>
        <p style="color:#777;font-size:13px">Generate secure API keys</p>

        <div id="keyDisplay"></div>
        <button class="btn btn-primary" onclick="generateKey()">Generate Key</button>

        <button class="btn btn-outline" onclick="clearDB()" style="margin-left:8px">Clear DB</button>

        <div id="dbLog"></div>
      </div>

      <div class="box">
        <h3>System</h3>
        <p style="color:#888">LocalStorage DB simulation active</p>
      </div>

    </div>
  </div>
</section>

<footer>
  © 2026 Lumen Labs
</footer>

<script>
function generateKey(){
  const chars="ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
  let key="lm_";
  for(let i=0;i<12;i++) key+=chars[Math.floor(Math.random()*chars.length)];
  key+="_v1";

  const display=document.getElementById("keyDisplay");
  display.style.display="block";
  display.innerText=key;

  let db=JSON.parse(localStorage.getItem("lumen_db")||"[]");
  db.push({key,time:new Date().toLocaleTimeString()});
  localStorage.setItem("lumen_db",JSON.stringify(db));

  renderDB();
}

function renderDB(){
  const log=document.getElementById("dbLog");
  let db=JSON.parse(localStorage.getItem("lumen_db")||"[]");

  if(!db.length){
    log.innerHTML="No records";
    return;
  }

  log.innerHTML=db.slice().reverse().map(i=>
    `[${i.time}] KEY=${i.key}`
  ).join("<br>");
}
